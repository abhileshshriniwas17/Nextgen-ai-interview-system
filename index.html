<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Interview Pro - Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= BACKGROUND ================= */
body{
    background: radial-gradient(circle at top, #0f0f1a, #050507);
    font-family:'Inter',sans-serif;
    overflow:hidden;
}

/* Animated gradient layer */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,#7c3aed,#06b6d4,#6366f1);
    opacity:0.08;
    z-index:-1;
    animation:moveBg 10s infinite alternate;
}

@keyframes moveBg{
    0%{transform:translateX(-10%) translateY(-10%)}
    100%{transform:translateX(10%) translateY(10%)}
}

/* ================= GLASS ================= */
.glass{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 30px rgba(168,85,247,0.25);
    transition:0.4s;
}

.glass:hover{
    transform:translateY(-5px) scale(1.02);
    box-shadow:0 0 50px rgba(168,85,247,0.6);
}

/* ================= TEXT ================= */
.gradient-text{
    background:linear-gradient(90deg,#a855f7,#06b6d4,#6366f1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-size:200%;
    animation:shine 4s linear infinite;
}

@keyframes shine{
    to{background-position:200% center;}
}

/* ================= BUTTONS ================= */
button{
    transition:all 0.3s ease;
    font-weight:500;
    position:relative;
    overflow:hidden;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(168,85,247,0.8),
               0 0 40px rgba(6,182,212,0.6);
}

button::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:-100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
    transition:0.5s;
}

button:hover::after{
    left:100%;
}

/* ================= INPUT ================= */
input{
    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:#a855f7;
    box-shadow:0 0 15px rgba(168,85,247,0.8);
}

/* ================= STATUS ================= */
#status{
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{opacity:0.6}
    50%{opacity:1}
    100%{opacity:0.6}
}

/* ================= FORM ANIMATION ================= */
#loginForm, #signupForm{
    animation:fadeSlide 0.5s ease;
}

@keyframes fadeSlide{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen">

<!-- MAIN CARD -->
<div class="glass p-10 rounded-3xl w-full max-w-md text-center relative">

<!-- Glow Border -->
<div class="absolute inset-0 rounded-3xl border border-purple-500 opacity-20 blur-lg pointer-events-none"></div>

<h1 class="text-3xl font-bold gradient-text mb-6">AI Interview Pro</h1>

<!-- ================= MAIN OPTIONS ================= -->
<div id="mainOptions">

<button onclick="showLogin()"
class="w-full py-3 bg-purple-600 rounded-lg mb-3">
Login
</button>

<button onclick="showSignup()"
class="w-full py-3 bg-blue-600 rounded-lg mb-3">
Sign Up
</button>

<button onclick="tryFree()"
class="w-full py-3 border border-gray-600 rounded-lg">
Try Free (2 Attempts)
</button>

</div>

<!-- ================= LOGIN ================= -->
<div id="loginForm" class="hidden">

<input id="loginEmail" type="email" placeholder="Email"
class="w-full p-3 mb-3 rounded bg-black border border-gray-700">

<input id="loginPassword" type="password" placeholder="Password"
class="w-full p-3 mb-3 rounded bg-black border border-gray-700">

<button onclick="loginUser()"
class="w-full py-3 bg-purple-600 rounded-lg mb-3">
Login
</button>

<button onclick="back()"
class="text-gray-400 text-sm">← Back</button>

</div>

<!-- ================= SIGNUP ================= -->
<div id="signupForm" class="hidden">

<input id="name" placeholder="Full Name"
class="w-full p-3 mb-3 rounded bg-black border border-gray-700">

<input id="university" placeholder="University"
class="w-full p-3 mb-3 rounded bg-black border border-gray-700">

<input id="email" type="email" placeholder="Email"
class="w-full p-3 mb-3 rounded bg-black border border-gray-700">

<input id="password" type="password" placeholder="Password"
class="w-full p-3 mb-3 rounded bg-black border border-gray-700">

<button onclick="signupUser()"
class="w-full py-3 bg-blue-600 rounded-lg mb-3">
Register
</button>

<!-- PHONE OTP -->
<input id="phone" placeholder="+91XXXXXXXXXX"
class="w-full p-3 mb-3 rounded bg-black border border-gray-700">

<div id="recaptcha-container"></div>

<button onclick="sendOTP()"
class="w-full py-3 bg-green-600 rounded-lg mb-3">
Send OTP
</button>

<input id="otp" placeholder="Enter OTP"
class="w-full p-3 mb-3 rounded bg-black border border-gray-700">

<button onclick="verifyOTP()"
class="w-full py-3 bg-green-700 rounded-lg mb-3">
Verify OTP
</button>

<button onclick="back()"
class="text-gray-400 text-sm">← Back</button>

</div>

<!-- STATUS -->
<p id="status" class="mt-4 text-sm text-gray-400"></p>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
